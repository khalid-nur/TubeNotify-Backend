spring.application.name=tubenotify-backend
spring.output.ansi.enabled=ALWAYS
server.servlet.context-path=/api/v1

# DATABASE PostgresSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/tubenotifydb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT SECURITY CONFIGURATION
auth.token.jwtSecret=${JWT_SECRET_TOKEN}
auth.token.accessExpirationInMils=${JWT_EXP_MS}
auth.token.refreshExpirationInMils=${JWT_REFRESH_EXP_MS}

# COOKIE CONFIGURATION
app.useSecureCookie=${SECURE_COOKIE}

# CORS CONFIGURATION
app.corsAllowedOrigins=http://localhost:5173